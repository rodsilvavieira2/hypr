monitor=,preferred,auto,1

exec-once=$HOME/.config/hypr/autostart

input {
    kb_layout=
    kb_variant=ffffff
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1

    touchpad {
        natural_scroll=no
    }
}

misc{

}

general {
    gaps_in=4
    gaps_out=12
    border_size=2
    col.active_border=rgba(cba6f7ff) rgba(89b4faff) rgba(94e2d5ff) 10deg
    col.inactive_border=0xff45475a
}

decoration {
    rounding=15
}



animations {
    enabled=1

    # MacOS-inspired curves
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = cubic, 0.25, 0.1, 0.25, 1

    # Modern popin/scale animations for windows
    animation = windows, 1, 5, myBezier
    animation = windowsIn, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, cubic, popin 80%

    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, cubic, slide
}

dwindle {
    pseudotile=1 # enable pseudotiling on dwindle
    force_split=0
}

master{

}

gestures {
}

$terminal = alacritty

# example binds
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

# bind=,Print,exec,~/.config/hypr/scripts/screenshot

bind=,Print,exec,screenshot_gnome -s
bind=SUPER,L,exec,$terminal
bind=SUPER,Q,killactive,
# bind=SUPER,M,exit,
bind=SUPER,F,exec,nautilus
bind=SUPER,S,togglefloating,
bind=SUPER,N,exec, qs ipc -c notifications  call notifications toggle
# bind=SUPER,space,exec,wofi --show drun -o DP-3
bind=SUPER, space, exec, qs ipc -c search call search toggle
bind=SUPER,P,pseudo,
bind=SUPER,RETURN,fullscreen,1
bind=SUPER,K,fullscreen,0
# bind=SUPER,ESCAPE,exec,~/.config/hypr/scripts/power_menu

bind=SUPER,B,exec, clipboard_manager
bind=SUPER,W,exec, qs ipc -c wallpaper call wallpaper toggle
bind=SUPER,T,exec, qs ipc -c dashboard call dashboard  toggle

# Emergency process killers for system recovery
bind=SUPER ALT,K,exec,~/.config/hypr/scripts/emergency_kill
bind=SUPER ALT SHIFT,K,exec,~/.config/hypr/scripts/emergency_kill_nuclear 
bind = SUPER, TAB, exec, qs ipc -c overview call overview toggle
bind = SUPER, ESCAPE, exec, qs ipc -c powermenu call powermenu toggle 

binde = SUPER CTRL, right, resizeactive, 10 0
binde = SUPER CTRL, left, resizeactive, -10 0
binde = SUPER CTRL, up, resizeactive, 0 -10
binde = SUPER CTRL, down, resizeactive, 0 10


bind=SUPER,L,exec,~/.config/hypr/scripts/lock

bind=SUPER,left,movefocus,l
bind=SUPER,right,movefocus,r
bind=SUPER,up,movefocus,u
bind=SUPER,down,movefocus,d

bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9
bind=SUPER,0,workspace,10

bind=ALT,1,movetoworkspace,1
bind=ALT,2,movetoworkspace,2
bind=ALT,3,movetoworkspace,3
bind=ALT,4,movetoworkspace,4
bind=ALT,5,movetoworkspace,5
bind=ALT,6,movetoworkspace,6
bind=ALT,7,movetoworkspace,7
bind=ALT,8,movetoworkspace,8
bind=ALT,9,movetoworkspace,9
bind=ALT,0,movetoworkspace,10

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1

bind=SUPER,g,togglegroup
bind=SUPER,tab,changegroupactive

binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Layer rules for dunst notifications
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.3, match:namespace notifications
layerrule = animation slide, match:namespace notifications

# Window rules for file picker dialogs (float and center)
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = center on, match:class xdg-desktop-portal-gtk
windowrule = size 900 600, match:class xdg-desktop-portal-gtk

windowrule = float on, match:class org.freedesktop.impl.portal.desktop.gtk
windowrule = center on, match:class org.freedesktop.impl.portal.desktop.gtk
windowrule = size 900 600, match:class org.freedesktop.impl.portal.desktop.gtk

windowrule = float on, match:class zenity
windowrule = center on, match:class zenity
windowrule = size 900 600, match:class zenity

windowrule = float on, match:title Open File.*
windowrule = center on, match:title Open File.*
windowrule = size 900 600, match:title Open File.*

windowrule = float on, match:title Save File.*
windowrule = center on, match:title Save File.*
windowrule = size 900 600, match:title Save File.*

windowrule = float on, match:title Open Folder.*
windowrule = center on, match:title Open Folder.*
windowrule = size 900 600, match:title Open Folder.*

windowrule = float on, match:title Select Folder.*
windowrule = center on, match:title Select Folder.*
windowrule = size 900 600, match:title Select Folder.*

windowrule = float on, match:title Choose Files.*
windowrule = center on, match:title Choose Files.*

windowrule = float on, match:title Save As.*
windowrule = center on, match:title Save As.*

windowrule = float on, match:title Abrir.*
windowrule = center on, match:title Abrir.*

windowrule = float on, match:title Salvar.*
windowrule = center on, match:title Salvar.*

windowrule = float on, match:class blueman-manager
windowrule = center on, match:class blueman-manager
windowrule = size 800 600, match:class blueman-manager

windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = center on, match:class org.pulseaudio.pavucontrol
windowrule = size 800 600, match:class org.pulseaudio.pavucontrol

windowrule = float on, match:class Bitwarden
windowrule = center on, match:class Bitwarden
windowrule = size 1080 800, match:class Bitwarden
